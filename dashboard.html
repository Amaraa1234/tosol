<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хувийн санхүү бүртгэл</title>
    <!-- Bootstrap 5.3.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.4.2 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: #121212 !important;
        }
        .card-blue {
            background-color: #0d6efd;
            color: white;
            border-radius: 6px;
        }
        .card-green {
            background-color: #198754;
            color: white;
            border-radius: 6px;
        }
        .card-red {
            background-color: #dc3545;
            color: white;
            border-radius: 6px;
        }
        .badge-income {
            background-color: #198754;
            color: white;
        }
        .badge-expense {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-wallet text-warning me-2"></i> Санхүүгийн самбар
            </a>
            <div class="ms-auto text-white-50 small">
                <button onclick="clearAll()" class="btn btn-sm btn-outline-light rounded-pill px-3">гарах</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <!-- Үзүүлэлтийн картууд -->
        <div class="row g-3 mb-4">
            <div class="col-lg-4 col-md-6">
                <div class="card card-blue border-0 shadow-sm p-3">
                    <div class="small text-uppercase opacity-75 fw-semibold">Үлдэгдэл</div>
                    <div class="h3 fw-bold mb-0 mt-1" id="total-balance">0 ₮</div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card card-green border-0 shadow-sm p-3">
                    <div class="small text-uppercase opacity-75 fw-semibold">Нийт Орлого</div>
                    <div class="h3 fw-bold mb-0 mt-1" id="total-income">0 ₮</div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card card-red border-0 shadow-sm p-3">
                    <div class="small text-uppercase opacity-75 fw-semibold">Нийт Зарлага</div>
                    <div class="h3 fw-bold mb-0 mt-1" id="total-expense">0 ₮</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Зүүн тал: Форм -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Шинэ гүйлгээ</h5>
                    
                    <form id="transaction-form">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Гүйлгээний төрөл</label>
                            <select class="form-select shadow-sm" id="tx-type" required>
                                <option value="income">Орлого</option>
                                <option value="expense">Зарлага</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Ангилал</label>
                            <select class="form-select shadow-sm" id="tx-category" required>
                                <option value="Хоол хүнс">Хоол хүнс</option>
                                <option value="Цалин">Цалин орлого</option>
                                <option value="Тээвэр">Унаа, тээвэр</option>
                                <option value="Орон байр">Байр, цахилгаан</option>
                                <option value="Үзвэр үйлчилгээ">Чөлөөт цаг, худалдан авалт</option>
                                <option value="Бусад">Бусад</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Дүн (₮)</label>
                            <div class="input-group shadow-sm">
                                <input type="number" class="form-control fs-5 fw-bold" id="tx-amount" placeholder="0" min="1" required>
                                <span class="input-group-text fw-bold">₮</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Гүйлгээний огноо</label>
                            <input type="date" class="form-control shadow-sm" id="tx-date" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Тайлбар</label>
                            <input type="text" class="form-control shadow-sm" id="tx-desc" placeholder="Жишээ: И-март орсон, Бонус авсан..." required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 shadow-sm py-2">
                            <i class="fa-solid fa-circle-plus me-1"></i> Гүйлгээ Нэмэх
                        </button>
                    </form>
                </div>
            </div>

            <!-- Баруун тал: Хүснэгт -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Гүйлгээний түүх</h5>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Огноо</th>
                                    <th>Ангилал</th>
                                    <th>Тайлбар</th>
                                    <th>Төрөл</th>
                                    <th class="text-end">Дүн</th>
                                    <th class="text-center">Үйлдэл</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list">
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-4 small">
                                        Одоогоор гүйлгээ бүртгэгдээгүй байна.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const form = document.getElementById('transaction-form');
        const txList = document.getElementById('transaction-list');
        
        document.getElementById('tx-date').valueToDate = new Date();
        document.getElementById('tx-date').value = new Date().toISOString().substr(0, 10);

        function formatMoney(num) {
            return Number(num).toLocaleString() + ' ₮';
        }

        function updateSummary() {
            let income = 0;
            let expense = 0;

            transactions.forEach(tx => {
                if (tx.type === 'income') {
                    income += tx.amount;
                } else {
                    expense += tx.amount;
                }
            });

            const balance = income - expense;

            document.getElementById('total-balance').innerText = formatMoney(balance);
            document.getElementById('total-income').innerText = formatMoney(income);
            document.getElementById('total-expense').innerText = formatMoney(expense);
        }

        function renderTransactions() {
            txList.innerHTML = '';

            if (transactions.length === 0) {
                txList.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4 small">
                            Одоогоор гүйлгээ бүртгэгдээгүй байна.
                        </td>
                    </tr>`;
                return;
            }

            transactions.slice().reverse().forEach((tx, index) => {
                const actualIndex = transactions.length - 1 - index;
                const tr = document.createElement('tr');
                
                const typeBadge = tx.type === 'income' 
                    ? '<span class="badge badge-income">Орлого</span>' 
                    : '<span class="badge badge-expense">Зарлага</span>';
                
                const amountClass = tx.type === 'income' ? 'text-success fw-bold' : 'text-danger fw-bold';
                const amountSign = tx.type === 'income' ? '+' : '-';

                tr.innerHTML = `
                    <td>${tx.date}</td>
                    <td><span class="text-dark fw-medium">${tx.category}</span></td>
                    <td class="text-muted small">${tx.desc}</td>
                    <td>${typeBadge}</td>
                    <td class="text-end ${amountClass}">${amountSign} ${formatMoney(tx.amount)}</td>
                    <td class="text-center">
                        <button onclick="deleteTransaction(${actualIndex})" class="btn btn-sm btn-link text-danger p-0">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                txList.appendChild(tr);
            });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const newTx = {
                type: document.getElementById('tx-type').value,
                category: document.getElementById('tx-category').value,
                amount: parseFloat(document.getElementById('tx-amount').value),
                date: document.getElementById('tx-date').value,
                desc: document.getElementById('tx-desc').value
            };

            transactions.push(newTx);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-desc').value = '';

            init();
        });

        function deleteTransaction(index) {
            if(confirm('Энэ гүйлгээг устгахдаа итгэлтэй байна уу?')) {
                transactions.splice(index, 1);
                localStorage.setItem('transactions', JSON.stringify(transactions));
                init();
            }
        }

        function clearAll() {
            if(confirm('Бүх бүртгэлийг устгах уу?')) {
                transactions = [];
                localStorage.removeItem('transactions');
                init();
            }
        }

        function init() {
            renderTransactions();
            updateSummary();
        }

        init();
    </script>
</body>
</html>
