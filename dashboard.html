<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хувийн санхүү бүртгэл</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: #121212 !important;
        }
        .card-blue {
            background-color: #0d6efd;
            color: white;
            border-radius: 6px;
        }
        .card-green {
            background-color: #198754;
            color: white;
            border-radius: 6px;
        }
        .card-red {
            background-color: #dc3545;
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body class="roboto-regular">

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-wallet text-warning me-2"></i> Санхүүгийн самбар
                <span class="ms-3 fs-6 fw-normal text-white-50"><i class="fa-regular fa-user me-1"></i> <span id="user-email">хэрэглэгч@email.com</span></span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-warning rounded-pill px-3 fw-medium" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasBudget">
                    <i class="fa-solid fa-sliders me-1"></i> Төсөв Тогтоох
                </button>
                <button id="btn-logout" class="btn btn-sm btn-outline-light rounded-pill px-3">гарах</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        
        <div class="row mb-4">
            <div class="col-12" id="reward-badge-container">
                </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-lg-4 col-md-6">
                <div class="card card-blue border-0 shadow-sm p-3">
                    <div class="small text-uppercase opacity-75 fw-semibold">Үлдэгдэл</div>
                    <div class="h3 fw-bold mb-0 mt-1" id="total-balance">0 ₮</div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card card-green border-0 shadow-sm p-3">
                    <div class="small text-uppercase opacity-75 fw-semibold">Нийт Орлого</div>
                    <div class="h3 fw-bold mb-0 mt-1" id="total-income">0 ₮</div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card card-red border-0 shadow-sm p-3">
                    <div class="small text-uppercase opacity-75 fw-semibold">Нийт Зарлага</div>
                    <div class="h3 fw-bold mb-0 mt-1" id="total-expense">0 ₮</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Шинэ гүйлгээ</h5>
                    
                    <form id="transaction-form">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Гүйлгээний төрөл</label>
                            <select class="form-select shadow-sm" id="tx-type" required>
                                <option value="income">Орлого</option>
                                <option value="expense">Зарлага</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Ангилал</label>
                            <select class="form-select shadow-sm" id="tx-category" required>
                                <option value="Хоол хүнс">Хоол хүнс</option>
                                <option value="Цалин">Цалин орлого</option>
                                <option value="Тээвэр">Унаа, тээвэр</option>
                                <option value="Орон байр">Байр, цахилгаан</option>
                                <option value="Үзвэр үйлчилгээ">Чөлөөт цаг, худалдан авалт</option>
                                <option value="Бусад">Бусад</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Дүн (₮)</label>
                            <div class="input-group shadow-sm">
                                <input type="number" class="form-control fs-5 fw-bold" id="tx-amount" placeholder="0" min="1" required>
                                <span class="input-group-text fw-bold">₮</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Гүйлгээний огноо</label>
                            <input type="date" class="form-control shadow-sm" id="tx-date" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-medium text-secondary">Тайлбар</label>
                            <input type="text" class="form-control shadow-sm" id="tx-desc" placeholder="Жишээ: И-март орсон, Бонус авсан..." required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 shadow-sm py-2">
                            <i class="fa-solid fa-circle-plus me-1"></i> Гүйлгээ Нэмэх
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Гүйлгээний түүх</h5>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Огноо</th>
                                    <th>Ангилал</th>
                                    <th>Тайлбар</th>
                                    <th>Төрөл</th>
                                    <th class="text-end">Дүн</th>
                                    <th class="text-center">Үйлдэл</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list">
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-4 small">
                                        Одоогоор гүйлгээ бүртгэгдээгүй байна.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasBudget" aria-labelledby="offcanvasBudgetLabel">
        <div class="offcanvas-header border-b">
            <h5 class="offcanvas-title fw-bold" id="offcanvasBudgetLabel"><i class="fa-solid fa-sliders text-warning me-2"></i>Сар бүрийн төсөв</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <form id="budget-form" class="mb-4">
                <div class="mb-3">
                    <label class="form-label small fw-medium text-secondary">Ангилал</label>
                    <select class="form-select shadow-sm" id="budget-category" required>
                        <option value="Хоол хүнс">Хоол хүнс</option>
                        <option value="Цалин">Цалин орлого</option>
                        <option value="Тээвэр">Унаа, тээвэр</option>
                        <option value="Орон байр">Байр, цахилгаан</option>
                        <option value="Үзвэр үйлчилгээ">Чөлөөт цаг, худалдан авалт</option>
                        <option value="Бусад">Бусад</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-medium text-secondary">Төсвийн лимит дүн (₮)</label>
                    <input type="number" class="form-control shadow-sm fw-bold" id="budget-amount" placeholder="Лимит дүн оруулна уу" min="1" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-medium text-secondary">Хамаарах сар</label>
                    <input type="month" class="form-control shadow-sm" id="budget-month" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 shadow-sm">
                    <i class="fa-solid fa-check me-1"></i> Төсөв Хадгалах
                </button>
            </form>
            <hr>
            <div id="current-budgets-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
