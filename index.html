<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хувийн санхүү бүртгэл - Нэвтрэх</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://kit.fontawesome.com/d10192acad.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="roboto-regular">

    <div class="container d-flex min-vh-100 align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="card shadow-sm p-4 rounded-4 bg-white">
                    <div class="card-body">
                        
                        <h3 class="card-title text-center mb-4 fw-bold text-success">
                            <i class="fa-solid fa-sack-dollar text-warning"></i> Хувийн санхүү бүртгэл
                        </h3>
                        
                        <p class="text-muted text-center small mb-4">Нэвтрэх эсвэл шинээр бүртгүүлэх</p>
                        
                        <form id="auth-form">
                            <div class="mb-3">
                                <label class="form-label small text-secondary">Имэйл хаяг</label>
                                <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label small text-secondary">Нууц үг</label>
                                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" id="btn-login" class="btn btn-success py-2 fw-medium">Нэвтрэх</button>
                                <button type="button" id="btn-register" class="btn btn-outline-secondary py-2 fw-medium">Шинээр бүртгүүлэх</button>
                            </div>

                            <div id="message"></div>
                        </form>

                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
